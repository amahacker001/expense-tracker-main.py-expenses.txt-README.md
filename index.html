<!DOCTYPE html>
<html>
<head>
    <title>My Project</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        margin: 0;
    }

    .container {
        max-width: 400px;
        margin: 60px auto;
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
        text-align: center;
    }

    input {
        padding: 10px;
        margin: 5px 0;
        width: 45%;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    button {
        padding: 10px;
        border: none;
        background: #4CAF50;
        color: white;
        border-radius: 8px;
    }

    ul {
        list-style: none;
        padding: 0;
    }

    li {
        background: #f1f1f1;
        margin-top: 10px;
        padding: 10px;
        border-radius: 8px;
    }

    #total {
        text-align: center;
    }
</style>
</head>
<body>
    <div class="container">

        <h1>💰 Expense Tracker</h1>

        <input type="text" id="name" placeholder="Expense name">
        <input type="number" id="amount" placeholder="Amount">
        <button onclick="addExpense()">Add</button>

        <ul id="list"></ul>

        <h3 id="total">Total: ₦0</h3>

    </div>

    <script src="script.js"></script>
</body>
</html>
